<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 1 - Object Key Value Display</title>
</head>
<body>
    <table border="1" id="objectTable">
        <tr>
            <th>Key</th>
            <th>Value</th>
        </tr>
    </table>

    <script>
        var person = {
            firstName: "Muhammad",
            lastName: "Bilawal",
            age: 21
        };

        var table = document.getElementById("objectTable");

        for (var key in person) {
            var row = table.insertRow();
            row.insertCell(0).textContent = key;
            row.insertCell(1).textContent = person[key];
        }
    </script>
</body>
</html>
