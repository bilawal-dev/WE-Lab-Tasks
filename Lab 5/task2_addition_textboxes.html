<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2 - Addition of Two Numbers</title>
</head>
<body>
    Enter First Number <input type="text" id="num1" oninput="calculate()"><br><br>
    Enter Second Number <input type="text" id="num2" oninput="calculate()"><br><br>
    Result <input type="text" id="result" readonly>

    <script>
        function calculate() {
            var num1 = parseInt(document.getElementById("num1").value);
            var num2 = parseInt(document.getElementById("num2").value);
            document.getElementById("result").value = num1 + num2;
        }
    </script>
</body>
</html>
