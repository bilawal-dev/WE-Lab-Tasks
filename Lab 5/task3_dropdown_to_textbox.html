<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3 - Dropdown to Textbox</title>
</head>
<body>
    <span id="container">
        <select id="dropdown">
            <option>First</option>
            <option>Second</option>
            <option>Third</option>
        </select>
    </span>
    <button onclick="replaceDropdown()">New Entry</button>

    <script>
        function replaceDropdown() {
            var container = document.getElementById("container");
            var textbox = document.createElement("input");
            textbox.type = "text";
            container.innerHTML = "";
            container.appendChild(textbox);
        }
    </script>
</body>
</html>
