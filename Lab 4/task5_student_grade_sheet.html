<!DOCTYPE html>
<html>
<head>
    <title>Task 5: Student Grade Sheet</title>
    <script>
        let students = [];

        function calculateGrade(percentage) {
            if (percentage >= 80) return "A";
            if (percentage >= 60) return "B";
            if (percentage >= 40) return "C";
            if (percentage >= 20) return "D";
            return "F";
        }

        function addStudent() {
            let regNo = document.getElementById("regNo").value;
            let name = document.getElementById("studentName").value;
            let semester = document.getElementById("semester").value;
            let webEng = parseFloat(document.getElementById("webEng").value);
            let compProg = parseFloat(document.getElementById("compProg").value);
            let oop = parseFloat(document.getElementById("oop").value);
            let dsa = parseFloat(document.getElementById("dsa").value);
            let ai = parseFloat(document.getElementById("ai").value);

            if (!regNo || !name || !semester || isNaN(webEng) || isNaN(compProg) || isNaN(oop) || isNaN(dsa) || isNaN(ai)) {
                alert("Please fill all fields correctly!");
                return;
            }

            let total = webEng + compProg + oop + dsa + ai;
            let percentage = (total / 500) * 100;
            let grade = calculateGrade(percentage);

            students.push({
                regNo: regNo,
                name: name,
                semester: semester,
                webEng: webEng,
                compProg: compProg,
                oop: oop,
                dsa: dsa,
                ai: ai,
                total: total,
                percentage: percentage.toFixed(2),
                grade: grade
            });

            displayTable();
            document.getElementById("form").reset();
        }

        function displayTable() {
            let html = "<table border='1' cellpadding='10'>";
            html += "<tr><th>Reg No</th><th>Name</th><th>Semester</th><th>Web Eng</th><th>Comp Prog</th><th>OOP</th><th>DSA</th><th>AI</th><th>Total</th><th>Percentage</th><th>Grade</th></tr>";

            students.forEach(student => {
                html += "<tr>";
                html += "<td>" + student.regNo + "</td>";
                html += "<td>" + student.name + "</td>";
                html += "<td>" + student.semester + "</td>";
                html += "<td>" + student.webEng + "</td>";
                html += "<td>" + student.compProg + "</td>";
                html += "<td>" + student.oop + "</td>";
                html += "<td>" + student.dsa + "</td>";
                html += "<td>" + student.ai + "</td>";
                html += "<td>" + student.total + "</td>";
                html += "<td>" + student.percentage + "%</td>";
                html += "<td>" + student.grade + "</td>";
                html += "</tr>";
            });

            html += "</table>";
            document.getElementById("result").innerHTML = html;
        }
    </script>
</head>
<body>
    <h1>Task 5: Student Grade Sheet</h1>

    <h2>Input Student Details</h2>
    <form id="form" onsubmit="event.preventDefault(); addStudent();">
        <label>Registration Number:</label>
        <input type="text" id="regNo" required><br><br>

        <label>Student Name:</label>
        <input type="text" id="studentName" required><br><br>

        <label>Semester:</label>
        <input type="text" id="semester" required><br><br>

        <label>Web Engineering (out of 100):</label>
        <input type="number" id="webEng" required><br><br>

        <label>Computer Programming (out of 100):</label>
        <input type="number" id="compProg" required><br><br>

        <label>Object Oriented Programming (out of 100):</label>
        <input type="number" id="oop" required><br><br>

        <label>Data Structures & Algorithms (out of 100):</label>
        <input type="number" id="dsa" required><br><br>

        <label>Artificial Intelligence (out of 100):</label>
        <input type="number" id="ai" required><br><br>

        <button type="submit">Add Student</button>
    </form>

    <h2>Grading Criteria</h2>
    <p>A: 80-100% | B: 60-79% | C: 40-59% | D: 20-39% | F: Below 20%</p>

    <h2>Grade Sheet</h2>
    <div id="result"></div>
</body>
</html>
