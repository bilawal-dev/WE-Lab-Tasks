<!DOCTYPE html>
<html>
<head>
    <title>Task 2: Arrow Function - Display Name</title>
</head>
<body>
    <h1>Task 2: Arrow Function that Displays Your Name</h1>

    <button onclick="displayName()">Display Name</button>
    <p id="output"></p>

    <script>
        const displayName = () => {
            document.getElementById("output").innerText = "Bilawal";
        };
    </script>
</body>
</html>
